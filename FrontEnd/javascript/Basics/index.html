<html>
<head>
    <script src="script.js"></script> <!--External JavaScript using script tag and head tag ke andar javascript add karne se browser pehle javascript ko download kar lega then HTML and CSS ko download karega jisse website (frontend) load hone mein thoda time lag sakta hai jisse user ko der me dikh sakti hai website isiliye website ko fast render karane ke liye humein hamesha javascript ko body tag ke end me hi add karna chahiye jisse HTML and CSS pehle load ho jaaye and website user ko dikh jaaye pehle then javascript load ho isse user experience achcha rahega.-->
</head>
<body>
    <h2>
        External JavaScript
    </h2>
    <h3 id="demo" style="color:green;">
        GeeksforGeeks
    </h3>
    <button type="button" onclick="myFun()">
        Click Here
    </button>
    <button onclick="alert('Hello Foks!')">Click Me</button>  <!--Inline javascript using event handler attributes-->
    <!--<script src="script.js"></script aise humein end me javascript ko add karna chahiye jisse website fast load ho aur user experience achcha rahe.-->
</body>
</html>
